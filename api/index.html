<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NexusDB Studio — NIT Silchar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,600;0,700;0,800;1,600&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Reset & Root ──────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            /* NIT Silchar palette — navy, maroon, gold */
            --bg: #0d1117;
            --surface: #111827;
            --surface2: #1a2236;
            --border: #1e2d45;
            --border2: #2a3f60;
            --gold: #c9a84c;
            --gold-dim: #a88838;
            --gold-light: #e8c97a;
            --maroon: #8b1a2e;
            --maroon-light: #c0294a;
            --navy: #0f2044;
            --navy-light: #1a3366;
            --green: #3dba7c;
            --green-dim: #2e9060;
            --red: #d94f6b;
            --text: #d4c9b0;
            --text-dim: #7a8ba8;
            --text-faint: #334060;
            --mono: 'JetBrains Mono', monospace;
            --serif: 'EB Garamond', Georgia, serif;
            --display: 'Rajdhani', sans-serif;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            overflow: hidden
        }

        /* ── Decorative header stripe ──────────────────────────── */
        #app::before {
            content: '';
            display: block;
            height: 3px;
            flex-shrink: 0;
            background: linear-gradient(90deg, var(--maroon) 0%, var(--gold) 40%, var(--gold-light) 60%, var(--maroon) 100%);
        }

        /* ── Layout ────────────────────────────────────────────── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 60px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg, var(--navy) 0%, #162340 100%);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 200px;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, .06));
            pointer-events: none;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px
        }

        .logo-crest {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: radial-gradient(circle, #1a3366 0%, #0f1f40 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--serif);
            font-weight: 800;
            font-size: 15px;
            color: var(--gold);
            letter-spacing: -1px;
            box-shadow: 0 0 12px rgba(201, 168, 76, .2);
            flex-shrink: 0;
        }

        .logo-text-wrap {
            display: flex;
            flex-direction: column;
            gap: 1px
        }

        .logo-text {
            font-family: var(--display);
            font-weight: 700;
            font-size: 19px;
            color: var(--gold);
            letter-spacing: 2px;
            line-height: 1
        }

        .logo-sub {
            font-family: var(--display);
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px
        }

        .header-institute {
            font-family: var(--serif);
            font-size: 13px;
            font-style: italic;
            color: rgba(201, 168, 76, .6);
            letter-spacing: .5px;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-dim)
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        /* ── Sidebar ───────────────────────────────────────────── */
        #sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(15, 32, 68, .8), var(--surface));
        }

        .sidebar-label {
            font-family: var(--display);
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 600
        }

        .btn-icon {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            border: 1px solid var(--gold-dim);
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all .15s;
        }

        .btn-icon:hover {
            background: rgba(201, 168, 76, .1);
            border-color: var(--gold)
        }

        #table-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px
        }

        .table-item {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all .15s;
            border: 1px solid transparent;
            margin-bottom: 2px;
            border-left: 2px solid transparent;
        }

        .table-item:hover {
            background: var(--surface2);
            border-color: var(--border2);
            border-left-color: var(--gold-dim)
        }

        .table-item.active {
            background: rgba(201, 168, 76, .07);
            border-color: rgba(201, 168, 76, .2);
            border-left-color: var(--gold)
        }

        .table-item-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text)
        }

        .table-item.active .table-item-name {
            color: var(--gold)
        }

        .table-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            background: var(--border);
            color: var(--text-dim);
        }

        .table-item.active .table-badge {
            background: rgba(201, 168, 76, .15);
            color: var(--gold-dim)
        }

        .empty-tables {
            padding: 24px 12px;
            text-align: center;
            color: var(--text-faint);
            font-size: 12px;
            line-height: 1.8
        }

        /* ── Content ───────────────────────────────────────────── */
        #content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        /* ── Tab bar ───────────────────────────────────────────── */
        #tabs {
            display: flex;
            align-items: center;
            gap: 0;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            padding: 0 16px;
            height: 40px;
            flex-shrink: 0;
        }

        .tab {
            padding: 0 16px;
            height: 40px;
            display: flex;
            align-items: center;
            font-family: var(--display);
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all .15s;
            white-space: nowrap;
        }

        .tab:hover {
            color: var(--text)
        }

        .tab.active {
            color: var(--gold);
            border-color: var(--gold)
        }

        /* ── Panel ─────────────────────────────────────────────── */
        #panel {
            flex: 1;
            overflow: auto;
            padding: 24px
        }

        .panel-empty {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-faint);
            gap: 16px;
        }

        .panel-empty .empty-icon {
            font-size: 48px;
            opacity: .25
        }

        .panel-empty p {
            font-size: 13px;
            text-align: center;
            line-height: 1.8;
            max-width: 320px;
            font-family: var(--serif);
            font-size: 15px;
            font-style: italic
        }

        /* ── Cards / Sections ──────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 16px;
            border-top: 2px solid var(--gold-dim);
        }

        .card-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(15, 32, 68, .5), transparent);
        }

        .card-title {
            font-family: var(--display);
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 600
        }

        .card-body {
            padding: 16px
        }

        /* ── Data Table ─────────────────────────────────────────── */
        .data-table-wrap {
            overflow-x: auto
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        thead th {
            padding: 8px 12px;
            text-align: left;
            font-family: var(--display);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold-dim);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            font-weight: 600;
            background: rgba(15, 32, 68, .4);
        }

        tbody tr {
            transition: background .1s;
            border-bottom: 1px solid var(--border)
        }

        tbody tr:last-child {
            border-bottom: none
        }

        tbody tr:hover {
            background: rgba(201, 168, 76, .04)
        }

        tbody td {
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text)
        }

        .td-pk {
            color: var(--gold);
            font-weight: 600
        }

        .td-actions {
            display: flex;
            gap: 6px
        }

        .btn-sm {
            padding: 3px 10px;
            border-radius: 3px;
            border: 1px solid var(--border2);
            background: transparent;
            font-family: var(--display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .5px;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-sm.edit {
            color: var(--gold);
            border-color: rgba(201, 168, 76, .3)
        }

        .btn-sm.edit:hover {
            background: rgba(201, 168, 76, .1)
        }

        .btn-sm.del {
            color: var(--red);
            border-color: rgba(217, 79, 107, .3)
        }

        .btn-sm.del:hover {
            background: rgba(217, 79, 107, .1)
        }

        .no-rows {
            padding: 32px;
            text-align: center;
            color: var(--text-faint);
            font-size: 12px
        }

        /* ── Schema badges ──────────────────────────────────────── */
        .schema-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border)
        }

        .schema-row:last-child {
            border-bottom: none
        }

        .col-name {
            font-size: 13px;
            color: var(--text);
            min-width: 120px
        }

        .col-type {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 3px;
            font-family: var(--display);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .col-type.INT {
            background: rgba(26, 51, 102, .5);
            color: #6ea8d8;
            border: 1px solid rgba(110, 168, 216, .2)
        }

        .col-type.TEXT {
            background: rgba(61, 186, 124, .1);
            color: var(--green)
        }

        .col-type.FLOAT {
            background: rgba(201, 168, 76, .1);
            color: var(--gold)
        }

        .col-pk {
            font-family: var(--display);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 3px;
            background: rgba(139, 26, 46, .3);
            color: #e0607a;
            letter-spacing: 1px;
            border: 1px solid rgba(139, 26, 46, .5);
            font-weight: 600
        }

        /* ── Buttons ─────────────────────────────────────────────── */
        .btn {
            padding: 7px 18px;
            border-radius: 4px;
            border: none;
            font-family: var(--display);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--gold);
            color: #0d1117
        }

        .btn-primary:hover {
            background: var(--gold-light)
        }

        .btn-danger {
            background: var(--maroon);
            color: #fff;
            border: 1px solid var(--maroon-light)
        }

        .btn-danger:hover {
            background: var(--maroon-light)
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--text-dim);
            font-weight: 600
        }

        .btn-ghost:hover {
            border-color: var(--gold-dim);
            color: var(--gold)
        }

        /* ── Filter bar ──────────────────────────────────────────── */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center
        }

        .input {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 4px;
            padding: 7px 12px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            outline: none;
            transition: border-color .15s;
        }

        .input:focus {
            border-color: var(--gold)
        }

        .input::placeholder {
            color: var(--text-faint)
        }

        select.input option {
            background: var(--surface2)
        }

        /* ── Modal ───────────────────────────────────────────────── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
        }

        .overlay.open {
            opacity: 1;
            pointer-events: all
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-top: 3px solid var(--gold);
            border-radius: 6px;
            width: 520px;
            max-width: 95vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            transform: translateY(20px);
            transition: transform .2s;
        }

        .overlay.open .modal {
            transform: translateY(0)
        }

        .modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(15, 32, 68, .6), transparent);
        }

        .modal-title {
            font-family: var(--display);
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 1px;
            text-transform: uppercase
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px
        }

        /* ── Form elements ───────────────────────────────────────── */
        .form-group {
            margin-bottom: 16px
        }

        .form-label {
            display: block;
            font-family: var(--display);
            font-size: 11px;
            letter-spacing: 1.5px;
            color: var(--gold-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600
        }

        .form-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 4px;
            padding: 9px 12px;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color .15s
        }

        .form-input:focus {
            border-color: var(--gold)
        }

        .form-input::placeholder {
            color: var(--text-faint)
        }

        .form-select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 4px;
            padding: 9px 12px;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text);
            outline: none;
            cursor: pointer;
            appearance: none
        }

        .form-select:focus {
            border-color: var(--gold)
        }

        /* ── Column builder ──────────────────────────────────────── */
        .col-builder {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px
        }

        .col-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 8px;
            align-items: center
        }

        .col-row .form-input {
            padding: 7px 10px;
            font-size: 12px
        }

        .col-row .form-select {
            padding: 7px 10px;
            font-size: 12px
        }

        .pk-label {
            font-family: var(--display);
            font-size: 10px;
            color: var(--text-dim);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            letter-spacing: .5px
        }

        .pk-label input {
            accent-color: var(--gold)
        }

        .btn-remove {
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 3px;
            color: var(--red);
            cursor: pointer;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all .15s
        }

        .btn-remove:hover {
            background: rgba(217, 79, 107, .1)
        }

        /* ── Toast ───────────────────────────────────────────────── */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 200
        }

        .toast {
            padding: 10px 16px;
            border-radius: 4px;
            font-family: var(--display);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .5px;
            border-left: 3px solid;
            animation: slideIn .2s ease;
            min-width: 240px;
        }

        .toast.success {
            background: #0a1f13;
            border-color: var(--green);
            color: var(--green)
        }

        .toast.error {
            background: #1a0a10;
            border-color: var(--red);
            color: #e07a8f
        }

        .toast.info {
            background: #0f1e38;
            border-color: var(--gold);
            color: var(--gold)
        }

        @keyframes slideIn {
            from {
                transform: translateX(40px);
                opacity: 0
            }

            to {
                transform: none;
                opacity: 1
            }
        }

        /* ── Breadcrumb ──────────────────────────────────────────── */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            font-family: var(--display);
            font-size: 12px;
            letter-spacing: .5px
        }

        .bc-root {
            color: var(--text-dim)
        }

        .bc-sep {
            color: var(--text-faint)
        }

        .bc-current {
            color: var(--gold);
            font-weight: 600
        }

        /* ── Stats bar ───────────────────────────────────────────── */
        .stats-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 20px
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 12px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 2px solid var(--gold-dim);
            border-radius: 4px;
            min-width: 100px;
        }

        .stat-val {
            font-family: var(--display);
            font-size: 26px;
            font-weight: 700;
            color: var(--gold);
            line-height: 1
        }

        .stat-label {
            font-family: var(--display);
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 4px
        }

        /* ── Scrollbar ───────────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold-dim)
        }

        /* ── Query bar ───────────────────────────────────────────── */
        .query-bar {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            background: var(--navy);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            border-top: 2px solid var(--gold-dim);
        }

        .query-prompt {
            font-family: var(--display);
            font-size: 13px;
            font-weight: 700;
            color: var(--gold);
            white-space: nowrap;
            letter-spacing: 1px
        }

        #query-input {
            flex: 1;
            background: transparent;
            border: none;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            outline: none;
        }

        #query-input::placeholder {
            color: var(--text-faint)
        }

        .query-hint {
            font-size: 10px;
            color: var(--text-faint);
            white-space: nowrap;
            font-family: var(--display);
            letter-spacing: 1px
        }
    </style>
</head>

                            style="font-family:var(--sans);font-size:22px;font-weight:800;color:var(--text);letter-spacing:2px;margin-bottom:4px">

                </div>
                <!-- Query bar -->
                <div class="query-bar">
                    <span class="query-prompt" id="query-prompt">nexusdb &gt;</span>
                    <input id="query-input"
                        placeholder="Type a command: SELECT * FROM users WHERE id:1  |  USE tablename  |  HELP"

                </div>
            </div>

    <!-- Modals -->
    <div class="overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" id="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">Modal</div>
                <button class="btn-icon" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast-container"></div>

    <script>
        // ─── State ────────────────────────────────────────────────────────────────────
        const API = 'http://localhost:5000/api';
        let state = { tables: [], currentTable: null, currentSchema: [], currentRows: [], tab: 'data', filterCol: '', filterVal: '' };

        // ─── Toast ────────────────────────────────────────────────────────────────────
        function toast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }

        // ─── API helpers ──────────────────────────────────────────────────────────────
        async function api(method, path, body) {
            try {
                const opts = { method, headers: { 'Content-Type': 'application/json' } };
                if (body) opts.body = JSON.stringify(body);
                const res = await fetch(API + path, opts);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Request failed');
                return data;
            } catch (e) {
                if (e.message === 'Failed to fetch') throw new Error('Cannot reach API server. Make sure server.py is running on port 5000.');
                throw e;
            }
        }

        // ─── Health check ─────────────────────────────────────────────────────────────
        async function checkHealth() {
            try {
                const h = await api('GET', '/health');
                document.getElementById('status-dot').style.background = 'var(--green)';
                document.getElementById('status-text').textContent = `Connected · ${h.tables} table(s)`;
                return true;
            } catch {
                document.getElementById('status-dot').style.background = 'var(--red)';
                document.getElementById('status-dot').style.animation = 'none';
                document.getElementById('status-text').textContent = 'API offline';
                return false;
            }
        }

        // ─── Load Tables ──────────────────────────────────────────────────────────────
        async function loadTables() {
            try {
                const data = await api('GET', '/tables');
                state.tables = data.tables;
                renderSidebar();
                await checkHealth();
            } catch (e) { toast(e.message, 'error') }
        }

        function renderSidebar() {
            const el = document.getElementById('table-list');
            if (!state.tables.length) {
                el.innerHTML = '<div class="empty-tables">No tables yet.<br/>Click ＋ to create one.</div>';
                return;
            }
            el.innerHTML = state.tables.map(t => `
    <div class="table-item ${t.name === state.currentTable ? 'active' : ''}" onclick="selectTable('${t.name}')">
      <span class="table-item-name">${t.name}</span>
      <span class="table-badge">${t.rows}</span>
    </div>
  `).join('');
        }

        // ─── Select Table ─────────────────────────────────────────────────────────────
        async function selectTable(name) {
            state.currentTable = name;
            document.getElementById('query-prompt').textContent = `nexusdb > ${name} >`;
            renderSidebar();
            await loadTableData();
            renderPanel();
        }

        async function loadTableData() {
            try {
                let url = `/tables/${state.currentTable}/rows`;
                if (state.filterCol && state.filterVal) url += `?where=${state.filterCol}:${state.filterVal}`;
                const data = await api('GET', url);
                state.currentSchema = data.schema;
                state.currentRows = data.rows;
            } catch (e) { toast(e.message, 'error') }
        }

        // ─── Tab switch ───────────────────────────────────────────────────────────────
        function switchTab(tab) {
            state.tab = tab;
            ['data', 'schema', 'insert'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
            });
            renderPanel();
        }

        // ─── Main Render ──────────────────────────────────────────────────────────────
        function renderPanel() {

                return;
            }
            if (state.tab === 'data') renderDataTab(panel);
            else if (state.tab === 'schema') renderSchemaTab(panel);
            else if (state.tab === 'insert') renderInsertTab(panel);
        }

        function pkCol(schema) { return schema.find(c => c.isPrimaryKey) }

        function renderDataTab(panel) {
            const pk = pkCol(state.currentSchema);
            const cols = state.currentSchema;

            panel.innerHTML = `
    <div class="breadcrumb"><span class="bc-root">nexusdb</span><span class="bc-sep">›</span><span class="bc-current">${state.currentTable}</span></div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-val">${state.currentRows.length}</div><div class="stat-label">Rows</div></div>
      <div class="stat"><div class="stat-val">${cols.length}</div><div class="stat-label">Columns</div></div>
      <div class="stat"><div class="stat-val">${pk ? pk.name : '—'}</div><div class="stat-label">Primary Key</div></div>
    </div>
    <div class="filter-bar">
      <select class="input" id="filter-col" onchange="updateFilter()" style="width:140px">
        <option value="">— Filter col —</option>
        ${cols.map(c => `<option value="${c.name}" ${c.name === state.filterCol ? 'selected' : ''}>${c.name}</option>`).join('')}
      </select>
      <input class="input" id="filter-val" placeholder="value…" value="${state.filterVal}" oninput="updateFilter()" style="width:160px"/>
      <button class="btn btn-ghost" onclick="clearFilter()">✕ Clear</button>
      <button class="btn btn-danger" onclick="openDropTableConfirm()" style="margin-left:auto">⚠ Drop Table</button>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Rows — ${state.currentTable}</span>
        <button class="btn btn-primary" onclick="switchTab('insert')" style="padding:5px 12px;font-size:11px">＋ Insert Row</button>
      </div>
      <div class="data-table-wrap">
        ${state.currentRows.length === 0 ? `<div class="no-rows">No rows${state.filterCol ? ' matching filter' : ''}</div>` : `
        <table>
          <thead><tr>
            ${cols.map(c => `<th>${c.name}<br/><span style="color:var(--text-faint);font-size:9px">${c.type}${c.isPrimaryKey ? ' · PK' : ''}</span></th>`).join('')}
            <th>Actions</th>
          </tr></thead>
          <tbody>
            ${state.currentRows.map(row => `
              <tr>
                ${cols.map(c => `<td class="${c.isPrimaryKey ? 'td-pk' : ''}">${row[c.name] ?? ''}</td>`).join('')}
                <td><div class="td-actions">
                  <button class="btn-sm edit" onclick='openEditRow(${JSON.stringify(row)})'>Edit</button>
                  <button class="btn-sm del" onclick="deleteRow('${pk ? row[pk.name] : ''}')">Del</button>
                </div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>`}
      </div>
    </div>
  `;
        }

        function renderSchemaTab(panel) {
            panel.innerHTML = `
    <div class="breadcrumb"><span class="bc-root">nexusdb</span><span class="bc-sep">›</span><span class="bc-current">${state.currentTable}</span><span class="bc-sep">›</span><span class="bc-current">schema</span></div>
    <div class="card">
      <div class="card-header"><span class="card-title">Schema — ${state.currentTable}</span></div>
      <div class="card-body">
        ${state.currentSchema.map(c => `
          <div class="schema-row">
            <div class="col-name">${c.name}</div>
            <span class="col-type ${c.type}">${c.type}</span>
            ${c.isPrimaryKey ? '<span class="col-pk">PRIMARY KEY</span>' : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
        }

        function renderInsertTab(panel) {
            const cols = state.currentSchema;
            panel.innerHTML = `
    <div class="breadcrumb"><span class="bc-root">nexusdb</span><span class="bc-sep">›</span><span class="bc-current">${state.currentTable}</span><span class="bc-sep">›</span><span class="bc-current">insert</span></div>
    <div class="card" style="max-width:520px">
      <div class="card-header"><span class="card-title">Insert into ${state.currentTable}</span></div>
      <div class="card-body">
        ${cols.map(c => `
          <div class="form-group">
            <label class="form-label">${c.name} <span style="color:var(--text-faint)">${c.type}${c.isPrimaryKey ? ' · PK' : ''}</span></label>
            <input class="form-input" id="ins-${c.name}" placeholder="${c.type === 'INT' ? 'e.g. 42' : c.type === 'FLOAT' ? 'e.g. 3.14' : 'e.g. Alice'}" autocomplete="off"/>
          </div>
        `).join('')}
        <button class="btn btn-primary" onclick="submitInsert()" style="width:100%;justify-content:center;margin-top:8px">Insert Row</button>
      </div>
    </div>
  `;
        }

        // ─── Filter ───────────────────────────────────────────────────────────────────
        function updateFilter() {
            state.filterCol = document.getElementById('filter-col')?.value || '';
            state.filterVal = document.getElementById('filter-val')?.value || '';
            loadTableData().then(() => renderPanel());
        }
        function clearFilter() {
            state.filterCol = ''; state.filterVal = '';
            loadTableData().then(() => renderPanel());
        }

        // ─── Insert Row ───────────────────────────────────────────────────────────────
        async function submitInsert() {
            const row = {};
            for (const c of state.currentSchema) {
                row[c.name] = document.getElementById(`ins-${c.name}`)?.value?.trim() || '';
            }
            try {
                await api('POST', `/tables/${state.currentTable}/rows`, { row });
                toast('Row inserted successfully.', 'success');
                await loadTables();
                await loadTableData();
                switchTab('data');
            } catch (e) { toast(e.message, 'error') }
        }

        // ─── Edit Row ─────────────────────────────────────────────────────────────────
        function openEditRow(row) {
            const pk = pkCol(state.currentSchema);
            const editableCols = state.currentSchema.filter(c => !c.isPrimaryKey);
            setModal('Edit Row', `
    ${state.currentSchema.filter(c => c.isPrimaryKey).map(c => `
      <div class="form-group">
        <label class="form-label">${c.name} <span style="color:var(--text-faint)">PRIMARY KEY (readonly)</span></label>
        <input class="form-input" value="${row[c.name]}" readonly style="opacity:.5"/>
      </div>
    `).join('')}
    ${editableCols.map(c => `
      <div class="form-group">
        <label class="form-label">${c.name} <span style="color:var(--text-faint)">${c.type}</span></label>
        <input class="form-input" id="edit-${c.name}" value="${row[c.name] ?? ''}" autocomplete="off"/>
      </div>
    `).join('')}
  `, [
                { label: 'Cancel', cls: 'btn-ghost', fn: 'closeModal()' },
                { label: 'Update Row', cls: 'btn-primary', fn: `submitEdit('${pk ? row[pk.name] : ''}')` }
            ]);
        }

        async function submitEdit(pkVal) {
            const updates = {};
            state.currentSchema.filter(c => !c.isPrimaryKey).forEach(c => {
                const el = document.getElementById(`edit-${c.name}`);
                if (el) updates[c.name] = el.value.trim();
            });
            try {
                await api('PUT', `/tables/${state.currentTable}/rows/${pkVal}`, { updates });
                toast('Row updated.', 'success');
                closeModal();
                await loadTableData();
                renderPanel();
            } catch (e) { toast(e.message, 'error') }
        }

        // ─── Delete Row ───────────────────────────────────────────────────────────────
        async function deleteRow(pkVal) {
            if (!confirm(`Delete row with PK = '${pkVal}'?`)) return;
            try {
                await api('DELETE', `/tables/${state.currentTable}/rows/${pkVal}`);
                toast('Row deleted.', 'success');
                await loadTables();
                await loadTableData();
                renderPanel();
            } catch (e) { toast(e.message, 'error') }
        }

        // ─── Create Table ─────────────────────────────────────────────────────────────
        let createCols = [];
        function openCreateTable() {
            createCols = [{ name: 'id', type: 'INT', isPrimaryKey: true }];
            setModal('Create New Table', buildCreateTableBody(), [
                { label: 'Cancel', cls: 'btn-ghost', fn: 'closeModal()' },
                { label: 'Create Table', cls: 'btn-primary', fn: 'submitCreateTable()' }
            ]);
        }

        function buildCreateTableBody() {
            return `
    <div class="form-group">
      <label class="form-label">Table Name</label>
      <input class="form-input" id="ct-name" placeholder="e.g. products" autocomplete="off"/>
    </div>
    <div class="form-label" style="margin-bottom:10px">Columns <span style="color:var(--text-faint);font-size:10px">(first column = Primary Key)</span></div>
    <div class="col-builder" id="col-builder">
      ${createCols.map((c, i) => buildColRow(c, i)).join('')}
    </div>
    <button class="btn btn-ghost" onclick="addColumn()" style="font-size:11px;padding:5px 12px;margin-top:4px">＋ Add Column</button>
  `;
        }

        function buildColRow(c, i) {
            return `
    <div class="col-row" id="col-row-${i}">
      <input class="form-input" value="${c.name}" placeholder="column_name" oninput="updateCol(${i},'name',this.value)"/>
      <select class="form-select" onchange="updateCol(${i},'type',this.value)" style="width:90px">
        ${['INT', 'TEXT', 'FLOAT'].map(t => `<option ${c.type === t ? 'selected' : ''}>${t}</option>`).join('')}
      </select>
      <label class="pk-label"><input type="radio" name="pk-col" ${c.isPrimaryKey ? 'checked' : ''} onchange="setPK(${i})"/> PK</label>
      ${i > 0 ? `<button class="btn-remove" onclick="removeCol(${i})">−</button>` : '<div style="width:26px"></div>'}
    </div>
  `;
        }

        function updateCol(i, key, val) { createCols[i][key] = val; }
        function setPK(i) { createCols.forEach((c, j) => c.isPrimaryKey = (j === i)); }
        function addColumn() {
            createCols.push({ name: '', type: 'TEXT', isPrimaryKey: false });
            document.getElementById('modal-body').innerHTML = buildCreateTableBody();
        }
        function removeCol(i) {
            createCols.splice(i, 1);
            if (!createCols.some(c => c.isPrimaryKey) && createCols.length) createCols[0].isPrimaryKey = true;
            document.getElementById('modal-body').innerHTML = buildCreateTableBody();
        }

        async function submitCreateTable() {
            const name = document.getElementById('ct-name')?.value?.trim();
            if (!name) { toast('Table name required.', 'error'); return; }
            const cols = createCols.map((c, i) => ({
                name: (document.querySelector(`#col-row-${i} input[type=text], #col-row-${i} input:not([type])`) || { value: c.name }).value.trim() || c.name,
                type: c.type,
                isPrimaryKey: c.isPrimaryKey
            }));
            try {
                await api('POST', '/tables', { name, columns: cols });
                toast(`Table '${name}' created.`, 'success');
                closeModal();
                await loadTables();
                await selectTable(name);
            } catch (e) { toast(e.message, 'error') }
        }

        // ─── Drop Table ───────────────────────────────────────────────────────────────
        function openDropTableConfirm() {
            setModal('Drop Table', `
    <p style="color:var(--text);line-height:1.8">Are you sure you want to drop <strong style="color:var(--red)">${state.currentTable}</strong>?<br/>
    This will permanently delete the table and its CSV file.</p>
  `, [
                { label: 'Cancel', cls: 'btn-ghost', fn: 'closeModal()' },
                { label: 'Drop Table', cls: 'btn-danger', fn: 'confirmDropTable()' }
            ]);
        }

        async function confirmDropTable() {
            try {
                await api('DELETE', `/tables/${state.currentTable}`);
                toast(`Table '${state.currentTable}' dropped.`, 'success');
                state.currentTable = null; state.currentSchema = []; state.currentRows = [];
                document.getElementById('query-prompt').textContent = 'nexusdb >';
                closeModal();
                await loadTables();
                renderPanel();
            } catch (e) { toast(e.message, 'error') }
        }

        // ─── Modal helpers ────────────────────────────────────────────────────────────
        function setModal(title, body, buttons) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal-footer').innerHTML = buttons.map(b =>
                `<button class="btn ${b.cls}" onclick="${b.fn}">${b.label}</button>`
            ).join('');
            document.getElementById('modal-overlay').classList.add('open');
        }
        function closeModal(e) {
            if (e && e.target !== document.getElementById('modal-overlay')) return;
            document.getElementById('modal-overlay').classList.remove('open');
        }

        // ─── CLI Query bar ────────────────────────────────────────────────────────────
        document.getElementById('query-input').addEventListener('keydown', async e => {
            if (e.key !== 'Enter') return;
            const raw = e.target.value.trim();
            e.target.value = '';
            if (!raw) return;

            const up = raw.toUpperCase();
            // SHOW TABLES
            if (up === 'SHOW TABLES') { await loadTables(); toast('Tables refreshed.', 'info'); return; }
            // USE <table>
            const useM = up.match(/^USE\s+(\S+)$/);
            if (useM) { const t = raw.split(/\s+/)[1]; await selectTable(t); return; }
            // HELP
            if (up === 'HELP') { toast('Commands: SHOW TABLES | USE <table> | SELECT * FROM <table> | SELECT * FROM <table> WHERE <col>:<val>', 'info'); return; }
            // SELECT * FROM <table>
            const selM = up.match(/^SELECT\s+\*\s+FROM\s+(\S+)(?:\s+WHERE\s+(\S+)\s*=\s*(.+))?$/);
            if (selM) {
                const tbl = raw.split(/\s+/)[3];
                await selectTable(tbl);
                if (selM[2] && selM[3]) {
                    state.filterCol = selM[2]; state.filterVal = selM[3].trim();
                    await loadTableData(); renderPanel();
                }
                return;
            }
            // BACK
            if (up === 'BACK') {
                state.currentTable = null;
                document.getElementById('query-prompt').textContent = 'nexusdb >';
                renderSidebar(); renderPanel(); return;
            }
            // EXIT
            if (up === 'EXIT') { toast('Goodbye! (Close the tab to exit)', 'info'); return; }

            toast(`Unknown command: ${raw}. Type HELP for commands.`, 'error');
        });

        // ─── Init ─────────────────────────────────────────────────────────────────────
        checkHealth();
        loadTables();
        setInterval(checkHealth, 10000);
    </script>
</body>

</html>
